name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker
        run: docker build -t ghcr.io/barontrump/${{ github.event.repository.name }}:${{ github.sha }} .
      - name: Login to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push Docker image
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker tag ghcr.io/barontrump/${{ github.event.repository.name }}:${{ github.sha }} ghcr.io/barontrump/${{ github.event.repository.name }}:latest
          docker tag ghcr.io/barontrump/${{ github.event.repository.name }}:${{ github.sha }} ghcr.io/barontrump/${{ github.event.repository.name }}:${{ github.ref_name }}
          docker push --all-tags ghcr.io/barontrump/${{ github.event.repository.name }}
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Docker Image

            Pull the Docker image:

            ```sh
            docker pull ghcr.io/barontrump/${{ github.event.repository.name }}:${{ github.ref_name }}
            ```
